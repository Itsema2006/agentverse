<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Register</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #ff6a00 0%, #fff5ee 50%, #ffffff 100%);
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #bg-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .container {
    display: flex;
    width: 100%;
    max-width: 1100px;
    min-height: 600px;
    position: relative;
    z-index: 1;
  }

  .left-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 50px;
    position: relative;
    z-index: 2;
  }

  .left-panel h1 {
    font-size: 52px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .left-panel h1 span {
    display: block;
    color: #ff6a00;
  }

  .left-panel p {
    font-size: 14px;
    color: #7a5a45;
    max-width: 300px;
    line-height: 1.6;
    margin-bottom: 30px;
  }

  .back-home {
    position: absolute;
    top: 40px;
    left: 50px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #a05030;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: color 0.2s;
    z-index: 10;
  }

  .back-home:hover {
    color: #ff6a00;
  }

  .tag-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tag {
    padding: 6px 14px;
    border: 1px solid #ffb380;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #cc4f00;
    background: rgba(255,255,255,0.5);
  }

  .right-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .form-card {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 140, 60, 0.3);
    border-radius: 16px;
    padding: 40px 36px;
    width: 380px;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .form-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    background: #ffe8d6;
    border-radius: 10px;
    padding: 4px;
  }

  .form-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s ease;
    color: #b06040;
    border: none;
    background: none;
  }

  .form-tab.active {
    background: #ff6a00;
    color: #ffffff;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #a05030;
    margin-bottom: 8px;
  }

  .form-group input {
    width: 100%;
    padding: 14px 16px;
    background: #fff7f2;
    border: 1px solid #ffcba0;
    border-radius: 10px;
    color: #1a1a1a;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.3s ease;
  }

  .form-group input:focus {
    border-color: #ff6a00;
  }

  .form-group input::placeholder {
    color: #cca080;
  }

  .password-wrap {
    position: relative;
  }

  .password-wrap input {
    padding-right: 46px;
  }

  .password-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: #b06040;
    cursor: pointer;
    border-radius: 8px;
  }

  .password-toggle:hover {
    color: #ff6a00;
    background: rgba(255, 106, 0, 0.08);
  }

  .password-toggle:focus-visible {
    outline: 2px solid #ff6a00;
    outline-offset: 2px;
  }

  .password-toggle svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.9;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .password-toggle .icon-eye-off {
    display: none;
  }

  .password-toggle.is-visible .icon-eye {
    display: none;
  }

  .password-toggle.is-visible .icon-eye-off {
    display: inline;
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: #ff6a00;
    border: none;
    border-radius: 10px;
    color: #ffffff;
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 6px;
  }

  .submit-btn:hover {
    background: #ff8c33;
    transform: translateY(-1px);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
  }

  .divider span {
    font-size: 11px;
    color: #b06040;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #ffcba0;
  }

  .social-btns {
    display: flex;
    gap: 10px;
  }

  .social-btn {
    flex: 1;
    padding: 12px;
    background: #fff7f2;
    border: 1px solid #ffcba0;
    border-radius: 10px;
    color: #cc5500;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .social-btn:hover {
    border-color: #ff6a00;
    color: #ff6a00;
  }

  .form-section {
    display: none;
  }

  .form-section.active {
    display: block;
    animation: fadeSlide 0.4s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .forgot-link {
    text-align: right;
    margin-top: -10px;
    margin-bottom: 18px;
  }

  .forgot-link a {
    font-size: 11px;
    color: #ff6a00;
    text-decoration: none;
    font-weight: 600;
  }

  @media (max-width: 900px) {
    body {
      align-items: flex-start;
      justify-content: flex-start;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .container {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 88px 16px 24px;
      gap: 18px;
      min-height: auto;
    }

    .left-panel {
      width: 100%;
      padding: 0 8px 6px;
      text-align: center;
      align-items: center;
    }

    .left-panel h1 {
      font-size: clamp(30px, 8vw, 40px);
      line-height: 1;
      margin-bottom: 12px;
    }

    .left-panel p {
      text-align: center;
      max-width: 36ch;
      margin-bottom: 20px;
    }

    .tag-row {
      justify-content: center;
      gap: 8px;
    }

    .back-home {
      top: 16px;
      left: 16px;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
    }

    .right-panel {
      width: 100%;
    }

    .form-card {
      width: 100%;
      max-width: 440px;
      padding: 26px 20px;
      border-radius: 18px;
    }

    .form-tabs {
      margin-bottom: 24px;
    }

    .social-btns {
      gap: 8px;
    }
  }

  @media (max-width: 600px) {
    .container {
      padding: 78px 14px 18px;
      gap: 14px;
    }

    .left-panel {
      padding: 0 4px 4px;
    }

    .left-panel h1 {
      font-size: clamp(28px, 11vw, 34px);
      letter-spacing: -1.5px;
    }

    .left-panel p {
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 18px;
    }

    .tag-row {
      gap: 6px;
    }

    .tag {
      padding: 5px 11px;
      font-size: 10px;
      letter-spacing: 0.8px;
    }

    .form-card {
      padding: 22px 16px;
      border-radius: 16px;
    }

    .form-tabs {
      margin-bottom: 20px;
    }

    .form-tab {
      padding: 9px 8px;
      font-size: 12px;
      letter-spacing: 0.8px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      font-size: 10px;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
    }

    .form-group input {
      padding: 13px 14px;
      font-size: 13px;
    }

    .submit-btn {
      padding: 13px;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .divider {
      margin: 18px 0;
      gap: 10px;
    }

    .social-btn {
      padding: 11px;
      font-size: 17px;
    }

    .forgot-link {
      margin-top: -6px;
      margin-bottom: 14px;
    }
  }

  @media (max-width: 420px) {
    .container {
      padding-top: 72px;
    }

    .form-card {
      padding: 20px 14px;
    }

    .tag-row {
      justify-content: center;
    }

    .tag {
      flex: 1 1 calc(50% - 6px);
      text-align: center;
    }

    .social-btns {
      flex-direction: column;
    }
  }
</style>
</head>
<body>

<a href="index.html" class="back-home">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Back to Home
</a>

<canvas id="bg-canvas"></canvas>

<div class="container">
  <div class="left-panel">
    <h1>
      AGENT
      <span>VERSE.</span>
    </h1>
    <p>Discover & deploy autonomous AI agents. The infrastructure for production-ready automation workflows.</p>
    <div class="tag-row">
      <div class="tag">Marketplace</div>
      <div class="tag">AI Agents</div>
      <div class="tag">Deploy</div>
      <div class="tag">Orchestrate</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-card">
      <div class="form-tabs">
        <button class="form-tab active" data-tab="login">Sign In</button>
        <button class="form-tab" data-tab="register">Register</button>
      </div>

      <!-- Error/Success Notice -->
      <div id="notice" style="display: none; padding: 12px; margin-bottom: 16px; border-radius: 8px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; font-size: 13px; font-weight: 600; text-align: center;"></div>

      <div class="form-section active" id="login-form">
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="text" id="loginId" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="password-wrap">
              <input type="password" id="loginPassword" placeholder="••••••••" required />
              <button type="button" class="password-toggle" id="toggleLoginPassword" aria-label="Show password" aria-pressed="false">
                <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M1.5 12s3.8-6.5 10.5-6.5S22.5 12 22.5 12s-3.8 6.5-10.5 6.5S1.5 12 1.5 12z"></path>
                  <circle cx="12" cy="12" r="3.2"></circle>
                </svg>
                <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 3l18 18"></path>
                  <path d="M10.6 6.6A9.9 9.9 0 0 1 12 6.5c6.7 0 10.5 5.5 10.5 5.5a19.2 19.2 0 0 1-4 4.8"></path>
                  <path d="M6.7 6.7A18.5 18.5 0 0 0 1.5 12s3.8 6.5 10.5 6.5c1.7 0 3.2-.4 4.5-1.1"></path>
                </svg>
              </button>
            </div>
          </div>
          <div class="forgot-link">
            <a href="#">Forgot password?</a>
          </div>
          <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
        </form>
        <div class="divider"><span>or continue with</span></div>
        <div class="social-btns">
          <button class="social-btn" type="button" data-provider="google">G</button>
        </div>
      </div>

      <div class="form-section" id="register-form">
        <form id="registerForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="••••••••" required />
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="regConfirmPassword" placeholder="••••••••" required />
          </div>
          <button type="submit" class="submit-btn" id="regBtn">Create Account</button>
        </form>
        <div class="divider"><span>or continue with</span></div>
        <div class="social-btns">
          <button class="social-btn" type="button" data-provider="google">G</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js';
import { initFirebaseAuth } from './js/firebase-auth.js';

// Tab switching with URL persistence
const tabs = document.querySelectorAll('.form-tab');
const sections = document.querySelectorAll('.form-section');

function switchTab(tabId) {
  tabs.forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tabId);
  });
  sections.forEach(s => {
    s.classList.toggle('active', s.id === tabId + '-form');
  });
}

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    switchTab(tab.dataset.tab);
  });
});

const loginPasswordInput = document.getElementById('loginPassword');
const toggleLoginPasswordBtn = document.getElementById('toggleLoginPassword');

if (loginPasswordInput && toggleLoginPasswordBtn) {
  toggleLoginPasswordBtn.addEventListener('click', () => {
    const isVisible = loginPasswordInput.type === 'text';
    loginPasswordInput.type = isVisible ? 'password' : 'text';
    toggleLoginPasswordBtn.classList.toggle('is-visible', !isVisible);
    toggleLoginPasswordBtn.setAttribute('aria-pressed', String(!isVisible));
    toggleLoginPasswordBtn.setAttribute('aria-label', isVisible ? 'Show password' : 'Hide password');
  });
}

// Check URL for direct tab access
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const tab = params.get('tab');
  if (tab === 'register' || tab === 'login') {
    switchTab(tab);
  }
});

// ─── Full-screen 3D Background ───
const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfff5ee);
scene.fog = new THREE.FogExp2(0xfff5ee, 0.025);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 2, 18);
camera.lookAt(0, 0, 0);

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0xfff0e0, 1.2);
ambientLight.name = 'bgAmbient';
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xff8c33, 2.5);
sunLight.name = 'bgSun';
sunLight.position.set(8, 12, 6);
scene.add(sunLight);

const rimLight = new THREE.PointLight(0xff6a00, 30, 40);
rimLight.name = 'bgRim';
rimLight.position.set(-6, 5, 8);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xffffff, 15, 40);
fillLight.name = 'bgFill';
fillLight.position.set(5, -3, 10);
scene.add(fillLight);

// ─── Floating Geometric Shapes (Instanced for performance) ───
const shapeDefs = [
  { geo: new THREE.IcosahedronGeometry(1, 0), count: 18 },
  { geo: new THREE.OctahedronGeometry(0.8, 0), count: 14 },
  { geo: new THREE.TorusGeometry(0.6, 0.25, 16, 32), count: 12 },
  { geo: new THREE.TetrahedronGeometry(0.7, 0), count: 10 },
  { geo: new THREE.TorusKnotGeometry(0.5, 0.18, 64, 16, 2, 3), count: 8 },
  { geo: new THREE.DodecahedronGeometry(0.65, 0), count: 10 },
];

const orangePalette = [
  0xff6a00, 0xff8c33, 0xffaa55, 0xffcc88, 0xffffff,
  0xff5500, 0xff9944, 0xffe0c0, 0xffbb66, 0xcc4400,
];

const allInstances = [];
const dummy = new THREE.Object3D();

shapeDefs.forEach((def, si) => {
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.15,
    metalness: 0.3,
    transparent: true,
    opacity: 0.85,
  });
  const instMesh = new THREE.InstancedMesh(def.geo, mat, def.count);
  instMesh.name = `shapeInst_${si}`;

  const instanceData = [];
  for (let i = 0; i < def.count; i++) {
    const spread = 35;
    const x = (Math.random() - 0.5) * spread;
    const y = (Math.random() - 0.5) * 20;
    const z = (Math.random() - 0.5) * 30 - 5;
    const scale = Math.random() * 0.6 + 0.3;
    const speedMul = Math.random() * 0.6 + 0.4;
    const phase = Math.random() * Math.PI * 2;
    const rotSpeed = (Math.random() - 0.5) * 2;
    const bobAmp = Math.random() * 1.5 + 0.5;
    const driftSpeed = Math.random() * 0.3 + 0.1;

    const col = new THREE.Color(orangePalette[Math.floor(Math.random() * orangePalette.length)]);
    instMesh.setColorAt(i, col);

    dummy.position.set(x, y, z);
    dummy.scale.setScalar(scale);
    dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    dummy.updateMatrix();
    instMesh.setMatrixAt(i, dummy.matrix);

    instanceData.push({ x, y, z, scale, speedMul, phase, rotSpeed, bobAmp, driftSpeed, rx: dummy.rotation.x, ry: dummy.rotation.y, rz: dummy.rotation.z });
  }
  instMesh.instanceMatrix.needsUpdate = true;
  if (instMesh.instanceColor) instMesh.instanceColor.needsUpdate = true;
  scene.add(instMesh);
  allInstances.push({ mesh: instMesh, data: instanceData });
});

// ─── Floating Ring Orbits ───
const ringGroup = new THREE.Group();
ringGroup.name = 'ringGroup';
scene.add(ringGroup);

const ringData = [];
for (let i = 0; i < 5; i++) {
  const radius = 3 + i * 2.2;
  const tubeRadius = 0.02 + Math.random() * 0.04;
  const ringGeo = new THREE.TorusGeometry(radius, tubeRadius, 8, 120);
  const ringMat = new THREE.MeshStandardMaterial({
    color: orangePalette[i % orangePalette.length],
    roughness: 0.1,
    metalness: 0.6,
    transparent: true,
    opacity: 0.35,
    emissive: 0xff6a00,
    emissiveIntensity: 0.15,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.name = `orbitRing_${i}`;
  ring.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.8;
  ring.rotation.y = (Math.random() - 0.5) * 0.5;
  ring.position.set((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 3, -2);
  ringGroup.add(ring);
  ringData.push({ speed: (Math.random() - 0.5) * 0.3, tilt: Math.random() * 0.2 });
}

// ─── Central Glowing Orb ───
const orbGeo = new THREE.SphereGeometry(1.8, 64, 64);
const orbMat = new THREE.MeshStandardMaterial({
  color: 0xff6a00,
  emissive: 0xff4400,
  emissiveIntensity: 0.6,
  roughness: 0.05,
  metalness: 0.5,
  transparent: true,
  opacity: 0.5,
});
const orb = new THREE.Mesh(orbGeo, orbMat);
orb.name = 'centralOrb';
orb.position.set(0, 0, -5);
scene.add(orb);

// Orb glow
const glowGeo = new THREE.SphereGeometry(2.8, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0xff8833,
  transparent: true,
  opacity: 0.08,
  side: THREE.BackSide,
});
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.name = 'orbGlow';
orb.add(glow);

// ─── Particle Field ───
const particleCount = 500;
const pGeo = new THREE.BufferGeometry();
const pPositions = new Float32Array(particleCount * 3);
const pVelocities = new Float32Array(particleCount * 3);
const pColors = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
  pPositions[i * 3] = (Math.random() - 0.5) * 60;
  pPositions[i * 3 + 1] = (Math.random() - 0.5) * 40;
  pPositions[i * 3 + 2] = (Math.random() - 0.5) * 40 - 5;
  pVelocities[i * 3] = (Math.random() - 0.5) * 0.01;
  pVelocities[i * 3 + 1] = Math.random() * 0.015 + 0.005;
  pVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.005;
  const c = new THREE.Color(orangePalette[Math.floor(Math.random() * orangePalette.length)]);
  pColors[i * 3] = c.r;
  pColors[i * 3 + 1] = c.g;
  pColors[i * 3 + 2] = c.b;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));

const pMat = new THREE.PointsMaterial({
  size: 0.08,
  vertexColors: true,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
});
const particleField = new THREE.Points(pGeo, pMat);
particleField.name = 'particleField';
scene.add(particleField);

// ─── Floating Wireframe Spheres ───
const wireGroup = new THREE.Group();
wireGroup.name = 'wireframeGroup';
scene.add(wireGroup);

const wireData = [];
for (let i = 0; i < 6; i++) {
  const r = Math.random() * 1.5 + 0.5;
  const wGeo = new THREE.IcosahedronGeometry(r, 1);
  const wMat = new THREE.MeshBasicMaterial({
    color: orangePalette[Math.floor(Math.random() * orangePalette.length)],
    wireframe: true,
    transparent: true,
    opacity: 0.15,
  });
  const wMesh = new THREE.Mesh(wGeo, wMat);
  wMesh.name = `wireSphere_${i}`;
  wMesh.position.set(
    (Math.random() - 0.5) * 30,
    (Math.random() - 0.5) * 20,
    (Math.random() - 0.5) * 20 - 5
  );
  wireGroup.add(wMesh);
  wireData.push({ rotX: (Math.random() - 0.5) * 0.5, rotY: (Math.random() - 0.5) * 0.5, bob: Math.random() * Math.PI * 2 });
}

// ─── Light Beams (Cone Geometry) ───
for (let i = 0; i < 4; i++) {
  const beamGeo = new THREE.ConeGeometry(0.8 + Math.random() * 0.5, 15 + Math.random() * 10, 8, 1, true);
  const beamMat = new THREE.MeshBasicMaterial({
    color: i % 2 === 0 ? 0xff6a00 : 0xffaa55,
    transparent: true,
    opacity: 0.03,
    side: THREE.DoubleSide,
  });
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.name = `lightBeam_${i}`;
  beam.position.set((Math.random() - 0.5) * 20, 8, -10 + Math.random() * 5);
  beam.rotation.z = (Math.random() - 0.5) * 0.6;
  beam.rotation.x = Math.PI + (Math.random() - 0.5) * 0.3;
  scene.add(beam);
}

// ─── Mouse tracking ───
let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

// ─── Animation Loop ───
const clock = new THREE.Clock();

function animate() {
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Camera gentle sway following mouse
  camera.position.x = THREE.MathUtils.lerp(camera.position.x, mouseX * 3, 0.02);
  camera.position.y = THREE.MathUtils.lerp(camera.position.y, 2 + mouseY * 2, 0.02);
  camera.lookAt(0, 0, -2);

  // Animate instanced shapes
  allInstances.forEach(({ mesh, data }) => {
    for (let i = 0; i < data.length; i++) {
      const d = data[i];
      const bobY = Math.sin(t * d.speedMul + d.phase) * d.bobAmp;
      const driftX = Math.sin(t * d.driftSpeed + d.phase) * 1.5;

      dummy.position.set(d.x + driftX, d.y + bobY, d.z);
      dummy.scale.setScalar(d.scale + Math.sin(t * 0.8 + d.phase) * 0.08);
      dummy.rotation.set(
        d.rx + t * d.rotSpeed * 0.4,
        d.ry + t * d.rotSpeed * 0.3,
        d.rz + t * d.rotSpeed * 0.2
      );
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
    }
    mesh.instanceMatrix.needsUpdate = true;
  });

  // Rings rotate
  ringGroup.children.forEach((ring, i) => {
    ring.rotation.z += ringData[i].speed * 0.01;
    ring.rotation.x += ringData[i].tilt * 0.003;
  });

  // Central orb pulse
  const orbScale = 1 + Math.sin(t * 1.2) * 0.12;
  orb.scale.setScalar(orbScale);
  orbMat.emissiveIntensity = 0.6 + Math.sin(t * 2) * 0.25;
  glowMat.opacity = 0.06 + Math.sin(t * 1.5) * 0.03;
  orb.rotation.y = t * 0.15;

  // Particles drift upward
  const pArr = particleField.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pArr[i * 3] += pVelocities[i * 3];
    pArr[i * 3 + 1] += pVelocities[i * 3 + 1];
    pArr[i * 3 + 2] += pVelocities[i * 3 + 2];
    // Reset if too high
    if (pArr[i * 3 + 1] > 20) {
      pArr[i * 3 + 1] = -20;
      pArr[i * 3] = (Math.random() - 0.5) * 60;
      pArr[i * 3 + 2] = (Math.random() - 0.5) * 40 - 5;
    }
  }
  particleField.geometry.attributes.position.needsUpdate = true;
  particleField.rotation.y = t * 0.02;

  // Wireframe spheres
  wireGroup.children.forEach((w, i) => {
    w.rotation.x += wireData[i].rotX * 0.005;
    w.rotation.y += wireData[i].rotY * 0.005;
    w.position.y += Math.sin(t * 0.5 + wireData[i].bob) * 0.005;
  });

  // Lights pulse
  rimLight.intensity = 30 + Math.sin(t * 1.5) * 10;
  fillLight.intensity = 15 + Math.sin(t * 2 + 1) * 5;

  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

initFirebaseAuth({
  switchTab,
  onLoginSuccess: function (user) {
    const email = (user && user.email) ? user.email.toLowerCase() : '';
    if (email === 'admin@gmail.com') {
      localStorage.setItem('agentverseAdminSession', 'true');
      window.location.href = 'admin.html';
    } else {
      localStorage.setItem('agentverseUserSession', 'true');
      window.location.href = 'dashboard.html';
    }
  }
});
</script>

</body>
